# CI : build + installeur Inno Setup à chaque push, release GitHub sur tag v*.
name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Nécessaire pour que softprops/action-gh-release puisse créer la release.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Version tirée du tag (v1.2.3 → 1.2.3), sinon 0.0.0 pour les builds de branche.
      - name: Déterminer la version
        id: version
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace '^refs/tags/v', '' } else { '0.0.0' }
          "version=$v" >> $env:GITHUB_OUTPUT

      # Self-contained single-file : l'installeur ne dépend pas d'un runtime .NET présent.
      - name: Publier
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.version }} -o publish

      - name: Compiler l'installeur
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} setup.iss'

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: CopyClaude-Setup-${{ steps.version.outputs.version }}
          path: installer/*.exe

      - name: Release GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/*.exe

  # Version Linux (Rust + GTK4, X11). Pour l'instant : vérification de compilation.
  # Le packaging .deb/.rpm/AppImage arrivera en Phase 5 (cf. plan).
  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4

      - name: Installer les libs de dev GTK4 / X11
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libx11-dev libxfixes-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            linux/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('linux/Cargo.toml', 'linux/Cargo.lock') }}

      - name: Compiler
        run: cargo build --release

  # Packaging Linux : .deb / .rpm / .tar.gz. Exécuté à chaque push/PR pour valider
  # la chaîne ; attaché à la release GitHub uniquement sur tag v*.
  package-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances de build et de packaging
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libx11-dev libxfixes-dev imagemagick

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + outils)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            linux/target
          key: ${{ runner.os }}-cargo-pkg-${{ hashFiles('linux/Cargo.toml', 'linux/Cargo.lock') }}

      - name: Installer cargo-deb / cargo-generate-rpm
        run: |
          cargo install cargo-deb --locked || true
          cargo install cargo-generate-rpm --locked || true

      # Version depuis le tag (v1.2.3 → 1.2.3), sinon 0.0.0.
      - name: Déterminer la version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then VER="${GITHUB_REF#refs/tags/v}"; else VER="0.0.0"; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          sed -i "s/^version = \"0.1.0\"/version = \"$VER\"/" Cargo.toml

      - name: Générer l'icône PNG depuis icon.ico
        run: convert "../icon.ico[0]" -resize 256x256 packaging/icon.png

      - name: Compiler (release)
        run: cargo build --release

      # Le cache conserve linux/target ; on purge les sorties de packaging pour
      # qu'aucun paquet d'un run précédent (autre version) ne soit ramassé par les globs.
      - name: Purger les sorties de packaging
        run: rm -rf target/debian target/generate-rpm

      - name: Construire le .deb
        run: cargo deb --no-build

      - name: Construire le .rpm
        run: cargo generate-rpm

      - name: Construire le .tar.gz
        run: |
          mkdir -p "dist/copyclaude"
          cp target/release/copyclaude "dist/copyclaude/"
          cp packaging/copyclaude.desktop packaging/icon.png "dist/copyclaude/"
          tar -czf "copyclaude-${{ steps.version.outputs.version }}-linux-x64.tar.gz" -C dist copyclaude

      - name: Publier les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: copyclaude-linux-${{ steps.version.outputs.version }}
          path: |
            linux/target/debian/*.deb
            linux/target/generate-rpm/*.rpm
            linux/copyclaude-*-linux-x64.tar.gz

      - name: Release GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/target/debian/*.deb
            linux/target/generate-rpm/*.rpm
            linux/copyclaude-*-linux-x64.tar.gz
